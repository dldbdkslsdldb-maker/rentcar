<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>차량 사용 신청 - 그랜저 GN7</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Malgun Gothic', sans-serif; background: #f0f2f5; min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #1a3a5c, #2e6da4);
    color: white; padding: 18px 24px;
    display: flex; align-items: center; justify-content: center; gap: 16px;
    text-align: center;
  }
  header .logo-img { height: 36px; object-fit: contain; flex-shrink: 0; margin-right: -8px; }
  header .company-name { font-size: 36px; font-weight: 800; white-space: nowrap; }
  header .title-sep { font-size: 28px; opacity: 0.45; margin: 0 6px; }
  header h1 { font-size: 36px; font-weight: 800; }
  header p { font-size: 12px; opacity: 0.8; margin-top: 4px; }

  .datetime-range {
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  }
  .datetime-range input[type="date"] { flex: 1; min-width: 130px; }
  .datetime-range select { width: 70px; }
  .datetime-range .sep { font-weight: 700; color: #444; white-space: nowrap; }

  .container { max-width: 720px; margin: 30px auto; padding: 0 16px 60px; }

  .tab-bar {
    display: flex; gap: 0; background: white;
    border-radius: 10px 10px 0 0; overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .tab-btn {
    flex: 1; padding: 14px; border: none; background: #f7f9fc;
    cursor: pointer; font-size: 14px; font-weight: 600;
    color: #666; transition: all 0.2s; border-bottom: 3px solid transparent;
  }
  .tab-btn.active { background: white; color: #1a3a5c; border-bottom-color: #2e6da4; }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .card {
    background: white; border-radius: 0 0 10px 10px;
    padding: 28px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  .section-title {
    font-size: 13px; font-weight: 700; color: #2e6da4;
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-bottom: 16px; padding-bottom: 8px;
    border-bottom: 2px solid #e8f0f8;
  }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }

  label { font-size: 13px; font-weight: 600; color: #444; }
  label .req { color: #e74c3c; margin-left: 2px; }

  input, select, textarea {
    padding: 10px 12px; border: 1.5px solid #dde3ec;
    border-radius: 7px; font-size: 14px; font-family: inherit;
    transition: border-color 0.2s; background: #fafbfd;
  }
  input:focus, select:focus, textarea:focus {
    outline: none; border-color: #2e6da4; background: white;
  }
  input:disabled, select:disabled, textarea:disabled {
    background: #f0f2f5; color: #999; cursor: not-allowed;
  }
  textarea { resize: vertical; min-height: 80px; width: 100%; }

  .status-badge {
    display: inline-block; padding: 4px 12px; border-radius: 20px;
    font-size: 12px; font-weight: 700;
  }
  .status-신청중 { background: #fff3cd; color: #856404; }
  .status-승인됨 { background: #d1e7dd; color: #0f5132; }
  .status-반려 { background: #f8d7da; color: #842029; }
  .status-사용후입력완료 { background: #cfe2ff; color: #084298; }
  .status-확정 { background: #d3d3d3; color: #333; }

  .btn {
    padding: 11px 24px; border: none; border-radius: 7px;
    font-size: 14px; font-weight: 700; cursor: pointer;
    transition: all 0.2s; font-family: inherit;
  }
  .btn-primary { background: #2e6da4; color: white; }
  .btn-primary:hover { background: #1a3a5c; }
  .btn-primary:disabled { background: #aaa; cursor: not-allowed; }
  .btn-success { background: #198754; color: white; }
  .btn-success:hover { background: #146c43; }
  .btn-outline { background: white; color: #2e6da4; border: 1.5px solid #2e6da4; }
  .btn-outline:hover { background: #e8f0f8; }

  .btn-row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

  .alert {
    padding: 12px 16px; border-radius: 7px; font-size: 13px;
    margin-bottom: 16px;
  }
  .alert-info { background: #e8f0f8; color: #1a3a5c; border-left: 4px solid #2e6da4; }
  .alert-warning { background: #fff3cd; color: #856404; border-left: 4px solid #ffc107; }
  .alert-success { background: #d1e7dd; color: #0f5132; border-left: 4px solid #198754; }
  .alert-danger { background: #f8d7da; color: #842029; border-left: 4px solid #dc3545; }

  .list-item {
    border: 1.5px solid #dde3ec; border-radius: 8px;
    padding: 16px; margin-bottom: 12px; cursor: pointer;
    transition: all 0.2s; background: white;
  }
  .list-item:hover { border-color: #2e6da4; box-shadow: 0 2px 8px rgba(46,109,164,0.1); }
  .list-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .list-item-title { font-size: 15px; font-weight: 700; color: #1a3a5c; }
  .list-item-meta { font-size: 12px; color: #666; margin-top: 4px; }

  .detail-section { margin-top: 20px; }
  .detail-row { display: flex; padding: 10px 0; border-bottom: 1px solid #f0f2f5; }
  .detail-label { width: 130px; font-size: 13px; color: #666; font-weight: 600; flex-shrink: 0; }
  .detail-value { font-size: 13px; color: #333; flex: 1; }

  .photo-preview { max-width: 100%; max-height: 200px; border-radius: 8px; margin-top: 8px; border: 1px solid #dde3ec; }

  .km-auto { background: #e8f4e8 !important; font-weight: 700; color: #198754 !important; }

  .empty-state { text-align: center; padding: 40px; color: #999; }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }

  .loading { text-align: center; padding: 30px; color: #666; }

  #etcTextGroup { display: none; }

  .back-btn {
    display: flex; align-items: center; gap: 6px;
    color: #2e6da4; cursor: pointer; font-size: 14px;
    font-weight: 600; margin-bottom: 16px; background: none; border: none;
  }
  .back-btn:hover { text-decoration: underline; }
</style>
</head>
<body>

<header>
  <img src="NEW.png" alt="신신사 로고" class="logo-img">
  <span class="company-name">(주)신신사</span>
  <span class="title-sep">|</span>
  <h1>차량 사용 신청</h1>
</header>

<div class="container">
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('apply')">신규 신청</button>
    <button class="tab-btn" onclick="switchTab('mylist')">내 신청 내역</button>
  </div>

  <!-- 신규 신청 탭 -->
  <div id="tab-apply" class="tab-panel active">
    <div class="card">
      <div class="alert alert-info">그랜저 GN7 (179하4233) 업무용 차량 사용 신청서입니다. 승인 후 사용 가능합니다.</div>
      <div class="section-title">신청 정보</div>
      <div class="form-grid">
        <div class="form-group full">
          <label>사용 일자 / 시간 <span class="req">*</span></label>
          <div class="datetime-range">
            <input type="date" id="startDate">
            <select id="startHour"></select>
            <select id="startMin"></select>
            <span class="sep">~</span>
            <input type="date" id="endDate">
            <select id="endHour"></select>
            <select id="endMin"></select>
          </div>
        </div>
        <div class="form-group">
          <label>이름 <span class="req">*</span></label>
          <input type="text" id="applicantName" placeholder="이름">
        </div>
        <div class="form-group">
          <label>부서 <span class="req">*</span></label>
          <input type="text" id="applicantDept" placeholder="부서">
        </div>
        <div class="form-group full">
          <label>비밀번호 <span class="req">*</span></label>
          <input type="password" id="appPassword" placeholder="내 신청 내역 조회 시 사용할 비밀번호">
        </div>
        <div class="form-group full">
          <label>목적지 <span class="req">*</span></label>
          <input type="text" id="destination" placeholder="예: 부산 거래처">
        </div>
        <div class="form-group full">
          <label>사용 목적 <span class="req">*</span></label>
          <select id="purpose" onchange="toggleEtcText()">
            <option value="">-- 선택하세요 --</option>
            <option value="임원 의전">임원 의전</option>
            <option value="장기출장">장기출장</option>
            <option value="타지출장">타지출장</option>
            <option value="거래처·고객사 픽업">거래처·고객사 픽업</option>
            <option value="공항 의전">공항 의전</option>
            <option value="외부 미팅·관공서 방문">외부 미팅·관공서 방문</option>
            <option value="채용 면접자 의전">채용 면접자 의전</option>
            <option value="행사·시상식 이동">행사·시상식 이동</option>
            <option value="긴급 서류·물자 운반">긴급 서류·물자 운반</option>
            <option value="부서 공용 출장">부서 공용 출장</option>
            <option value="기타">기타</option>
          </select>
        </div>
        <div class="form-group full" id="etcTextGroup">
          <label>기타 사유 <span class="req">*</span></label>
          <textarea id="etcText" placeholder="사용 목적을 상세히 기입해주세요"></textarea>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="submitApplication()">신청하기</button>
      </div>
    </div>
  </div>

  <!-- 내 신청 내역 탭 -->
  <div id="tab-mylist" class="tab-panel">
    <div class="card">
      <div class="form-group" style="margin-bottom:16px;">
        <label>내 신청 내역 조회</label>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <input type="text" id="searchName" placeholder="이름" style="flex:1;min-width:100px;">
          <input type="password" id="searchPassword" placeholder="비밀번호" style="flex:1;min-width:120px;">
          <button class="btn btn-primary" onclick="loadMyList()">조회</button>
        </div>
      </div>
      <div id="myListContainer"><div class="empty-state"><div class="icon">📋</div><p>이름을 입력하고 조회하세요</p></div></div>
    </div>

    <!-- 상세/입력 패널 -->
    <div id="detailPanel" style="display:none;">
      <div class="card" style="margin-top:12px; border-radius:10px;">
        <button class="back-btn" onclick="closeDetail()">← 목록으로</button>
        <div id="detailContent"></div>
      </div>
    </div>
  </div>
</div>

<script>
const GITHUB_OWNER = 'dldbdkslsdldb-maker';
const GITHUB_REPO = 'rentcar';
const API_BASE = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/issues`;
const API_TOKEN = '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';

// 탭 전환
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (tab==='apply'&&i===0)||(tab==='mylist'&&i===1)));
  document.getElementById('tab-apply').classList.toggle('active', tab==='apply');
  document.getElementById('tab-mylist').classList.toggle('active', tab==='mylist');
}

// 기타 선택 시 텍스트 박스 표시
function toggleEtcText() {
  const v = document.getElementById('purpose').value;
  document.getElementById('etcTextGroup').style.display = v === '기타' ? 'block' : 'none';
}

// 드롭다운 초기화
function initDatetimeDropdowns() {
  const hours = Array.from({length:24},(_,i)=>String(i).padStart(2,'0'));
  const mins = ['00','05','10','15','20','25','30','35','40','45','50','55'];
  ['startHour','endHour'].forEach(id => {
    const sel = document.getElementById(id);
    hours.forEach(h => { const o = document.createElement('option'); o.value=h; o.textContent=h+'시'; sel.appendChild(o); });
    sel.value = '09';
  });
  document.getElementById('endHour').value = '18';
  ['startMin','endMin'].forEach(id => {
    const sel = document.getElementById(id);
    mins.forEach(m => { const o = document.createElement('option'); o.value=m; o.textContent=m+'분'; sel.appendChild(o); });
  });
}
initDatetimeDropdowns();

// 신청 제출
async function submitApplication() {
  const startDate = document.getElementById('startDate').value;
  const startHour = document.getElementById('startHour').value;
  const startMin = document.getElementById('startMin').value;
  const endDate = document.getElementById('endDate').value;
  const endHour = document.getElementById('endHour').value;
  const endMin = document.getElementById('endMin').value;
  const applicantName = document.getElementById('applicantName').value.trim();
  const applicantDept = document.getElementById('applicantDept').value.trim();
  const applicant = [applicantName, applicantDept].filter(Boolean).join(' / ');
  const destination = document.getElementById('destination').value.trim();
  const purposeSel = document.getElementById('purpose').value;
  const etcText = document.getElementById('etcText').value.trim();
  const appPassword = document.getElementById('appPassword').value.trim();

  if (!startDate || !endDate || !applicantName || !applicantDept || !destination || !purposeSel) {
    alert('모든 필수 항목을 입력해주세요.'); return;
  }
  if (!appPassword) { alert('비밀번호를 입력해주세요.'); return; }
  const useDate = startDate === endDate ? startDate : `${startDate} ~ ${endDate}`;
  const useTime = `${startHour}:${startMin} ~ ${endHour}:${endMin}`;
  const purpose = purposeSel === '기타' ? `기타: ${etcText || '(미입력)'}` : purposeSel;
  if (purposeSel === '기타' && !etcText) { alert('기타 사유를 입력해주세요.'); return; }

  const body = buildIssueBody({ useDate, useTime, applicant, destination, purpose, status: '신청중', password: appPassword });
  const title = `[차량신청] ${useDate} / ${applicant} / ${purpose}`;

  try {
    const res = await fetch(API_BASE, {
      method: 'POST',
      headers: {
        'Authorization': `token ${API_TOKEN}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ title, body, labels: ['신청중'] })
    });
    if (!res.ok) throw new Error('API 오류');
    const data = await res.json();
    alert(`신청이 완료되었습니다.\n신청번호: #${data.number}\n\n관리자 승인 후 사용 가능합니다.`);
    // 폼 초기화
    ['startDate','endDate','applicantName','applicantDept','destination','appPassword'].forEach(id => { const el = document.getElementById(id); if(el) el.value = ''; });
    document.getElementById('startHour').value = '09';
    document.getElementById('startMin').value = '00';
    document.getElementById('endHour').value = '18';
    document.getElementById('endMin').value = '00';
    document.getElementById('purpose').value = '';
    document.getElementById('etcText').value = '';
    document.getElementById('etcTextGroup').style.display = 'none';
  } catch(e) {
    alert('신청 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
  }
}

// Issue Body 생성
function buildIssueBody(d) {
  return `## 차량 사용 신청서

| 항목 | 내용 |
|------|------|
| 사용일자 | ${d.useDate || ''} |
| 사용시간 | ${d.useTime || ''} |
| 신청자 | ${d.applicant || ''} |
| 목적지 | ${d.destination || ''} |
| 사용목적 | ${d.purpose || ''} |
| 상태 | ${d.status || '신청중'} |
| 사용전km | ${d.beforeKm || ''} |
| 사용후km | ${d.afterKm || ''} |
| 사용km | ${d.usedKm || ''} |
| 계기판사진 | ${d.photoUrl || ''} |
| 비고 | ${d.memo || ''} |
| 반려사유 | ${d.rejectReason || d['반려사유'] || ''} |
| 비밀번호 | ${d.password || d['비밀번호'] || ''} |`;
}

// Issue Body 파싱
function parseIssueBody(body) {
  if (!body) return {};
  const d = {};
  const fields = ['사용일자','사용시간','신청자','목적지','사용목적','상태','사용전km','사용후km','사용km','계기판사진','비고','반려사유','비밀번호'];
  fields.forEach(f => {
    const re = new RegExp(`\\| ${f} \\| (.+?) \\|`);
    const m = body.match(re);
    d[f] = m ? m[1].trim() : '';
  });
  return d;
}

// 내 목록 조회
let myIssuesCache = {};
async function loadMyList() {
  const name = document.getElementById('searchName').value.trim();
  const pw = document.getElementById('searchPassword').value.trim();
  if (!name) { alert('이름을 입력해주세요.'); return; }
  if (!pw) { alert('비밀번호를 입력해주세요.'); return; }
  const container = document.getElementById('myListContainer');
  container.innerHTML = '<div class="loading">조회 중...</div>';
  document.getElementById('detailPanel').style.display = 'none';
  myIssuesCache = {};

  try {
    const res = await fetch(`${API_BASE}?state=all&labels=&per_page=100`, {
      headers: { 'Accept': 'application/vnd.github+json' }
    });
    const issues = await res.json();
    const myIssues = issues.filter(i => {
      const d = parseIssueBody(i.body);
      return d['신청자'] && d['신청자'].includes(name) && d['비밀번호'] === pw;
    });

    if (myIssues.length === 0) {
      container.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>이름 또는 비밀번호가 일치하는 신청 내역이 없습니다</p></div>`;
      return;
    }

    myIssues.forEach(i => { myIssuesCache[i.number] = parseIssueBody(i.body); });

    container.innerHTML = myIssues.map(issue => {
      const d = myIssuesCache[issue.number];
      const statusClass = `status-${d['상태'] || '신청중'}`;
      return `<div class="list-item" onclick="openDetail(${issue.number})">
        <div class="list-item-header">
          <span class="list-item-title">#${issue.number} ${d['사용일자']} ${d['사용시간']}</span>
          <span class="status-badge ${statusClass}">${d['상태'] || '신청중'}</span>
        </div>
        <div class="list-item-meta">📍 ${d['목적지']} &nbsp;|&nbsp; 🎯 ${d['사용목적']}</div>
      </div>`;
    }).join('');
  } catch(e) {
    container.innerHTML = '<div class="alert alert-danger">조회 중 오류가 발생했습니다.</div>';
  }
}

// 상세 보기 / 입력
let currentIssue = null;
async function openDetail(issueNumber) {
  document.getElementById('detailPanel').style.display = 'block';
  document.getElementById('detailContent').innerHTML = '<div class="loading">불러오는 중...</div>';
  document.getElementById('detailPanel').scrollIntoView({ behavior: 'smooth' });

  try {
    const res = await fetch(`${API_BASE}/${issueNumber}`, {
      headers: { 'Accept': 'application/vnd.github+json' }
    });
    currentIssue = await res.json();
    renderDetail(currentIssue);
  } catch(e) {
    document.getElementById('detailContent').innerHTML = '<div class="alert alert-danger">불러오기 실패</div>';
  }
}

function renderDetail(issue) {
  const d = parseIssueBody(issue.body);
  const status = d['상태'] || '신청중';
  const isLocked = ['사용후입력완료','확정','반려'].includes(status);
  const canInputAfter = status === '승인됨';
  const statusClass = `status-${status}`;

  let html = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h3 style="font-size:16px;color:#1a3a5c;">신청 #${issue.number}</h3>
      <span class="status-badge ${statusClass}">${status}</span>
    </div>`;

  if (status === '반려') {
    html += `<div class="alert alert-danger">이 신청은 반려되었습니다.${d['반려사유'] ? `<br><strong>반려 사유:</strong> ${d['반려사유']}` : ''}<br>필요 시 새로 신청해주세요.</div>`;
  }
  if (status === '신청중') {
    html += `<div class="alert alert-warning">관리자 승인 대기 중입니다.</div>`;
  }
  if (status === '승인됨') {
    html += `<div class="alert alert-success">승인되었습니다. 사용 후 아래 항목을 입력해주세요.</div>`;
  }
  if (status === '확정') {
    html += `<div class="alert alert-info">확정 완료된 내역입니다. 수정이 불가합니다.</div>`;
  }

  // 신청 정보
  html += `<div class="section-title">신청 정보</div>
    <div class="detail-section">
      <div class="detail-row"><span class="detail-label">사용일자</span><span class="detail-value">${d['사용일자']}</span></div>
      <div class="detail-row"><span class="detail-label">사용시간</span><span class="detail-value">${d['사용시간']}</span></div>
      <div class="detail-row"><span class="detail-label">신청자</span><span class="detail-value">${d['신청자']}</span></div>
      <div class="detail-row"><span class="detail-label">목적지</span><span class="detail-value">${d['목적지']}</span></div>
      <div class="detail-row"><span class="detail-label">사용목적</span><span class="detail-value">${d['사용목적']}</span></div>
    </div>`;

  // 사용 후 입력 (승인됨 상태일 때만 입력 가능)
  html += `<div class="section-title" style="margin-top:20px;">사용 후 입력</div>`;

  if (canInputAfter) {
    html += `<div class="form-grid" style="margin-top:12px;">
      <div class="form-group">
        <label>사용 전 km <span class="req">*</span></label>
        <input type="number" id="inp-beforeKm" placeholder="출발 전 계기판 km" value="${d['사용전km']}">
      </div>
      <div class="form-group">
        <label>사용 후 km <span class="req">*</span></label>
        <input type="number" id="inp-afterKm" placeholder="도착 후 계기판 km" value="${d['사용후km']}" oninput="calcKm()">
      </div>
      <div class="form-group">
        <label>사용 km (자동계산)</label>
        <input type="number" id="inp-usedKm" class="km-auto" placeholder="자동계산" readonly>
      </div>
      <div class="form-group full">
        <label>계기판 사진</label>
        <input type="file" id="inp-photo" accept="image/*">
        ${d['계기판사진'] ? `<img src="${d['계기판사진']}" class="photo-preview">` : ''}
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-success" onclick="submitAfterUse(${issue.number})">사용 후 입력 완료</button>
    </div>`;
  } else if (['사용후입력완료', '확정'].includes(status)) {
    html += `<div class="form-grid" style="margin-top:12px;">
      <div class="form-group">
        <label>사용 전 km</label>
        <input type="number" value="${d['사용전km']}" disabled>
      </div>
      <div class="form-group">
        <label>사용 후 km</label>
        <input type="number" value="${d['사용후km']}" disabled>
      </div>
      <div class="form-group">
        <label>사용 km</label>
        <input type="number" value="${d['사용km']}" class="km-auto" disabled>
      </div>
      ${d['계기판사진'] ? `<div class="form-group full"><label>계기판 사진</label><img src="${d['계기판사진']}" class="photo-preview"></div>` : ''}
    </div>`;
  } else {
    html += `<div class="detail-section">
      <div class="detail-row"><span class="detail-label">사용 전 km</span><span class="detail-value">-</span></div>
      <div class="detail-row"><span class="detail-label">사용 후 km</span><span class="detail-value">-</span></div>
      <div class="detail-row"><span class="detail-label">사용 km</span><span class="detail-value">-</span></div>
    </div>`;
  }

  document.getElementById('detailContent').innerHTML = html;

  // km 자동계산 초기값
  if (canInputAfter && d['사용전km'] && d['사용후km']) calcKm();
}

function calcKm() {
  const before = parseFloat(document.getElementById('inp-beforeKm')?.value) || 0;
  const after = parseFloat(document.getElementById('inp-afterKm')?.value) || 0;
  const used = after - before;
  const el = document.getElementById('inp-usedKm');
  if (el) el.value = used >= 0 ? used : '';
}

// 사용 후 입력 제출 (토큰 없이는 불가 → 공개 API 미지원, PAT 필요)
// 신청자는 토큰 없이 조회만 가능, 사용 후 입력은 별도 처리
async function submitAfterUse(issueNumber) {
  const beforeKm = document.getElementById('inp-beforeKm').value;
  const afterKm = document.getElementById('inp-afterKm').value;
  const usedKm = document.getElementById('inp-usedKm').value;
  const photoFile = document.getElementById('inp-photo').files[0];

  if (!beforeKm || !afterKm) { alert('사용 전/후 km를 모두 입력해주세요.'); return; }
  if (parseFloat(afterKm) < parseFloat(beforeKm)) { alert('사용 후 km는 사용 전 km보다 커야 합니다.'); return; }

  let photoUrl = '';
  if (photoFile) {
    try {
      photoUrl = await uploadPhotoToIssue(issueNumber, photoFile, API_TOKEN);
    } catch(e) {
      alert('사진 업로드 실패. km 정보만 저장합니다.');
    }
  }

  const d = parseIssueBody(currentIssue.body);
  const updated = buildIssueBody({
    useDate: d['사용일자'], useTime: d['사용시간'],
    applicant: d['신청자'], destination: d['목적지'],
    purpose: d['사용목적'], status: '사용후입력완료',
    beforeKm, afterKm, usedKm,
    photoUrl: photoUrl || d['계기판사진']
  });

  try {
    const res = await fetch(`${API_BASE}/${issueNumber}`, {
      method: 'PATCH',
      headers: {
        'Authorization': `token ${API_TOKEN}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ body: updated, labels: ['사용후입력완료'] })
    });
    if (!res.ok) throw new Error();
    alert('사용 후 입력이 완료되었습니다.');
    openDetail(issueNumber);
  } catch(e) {
    alert('저장 실패. 잠시 후 다시 시도해주세요.');
  }
}

// 사진을 Issue 댓글로 업로드 (GitHub API 활용)
async function uploadPhotoToIssue(issueNumber, file, token) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = async (e) => {
      const base64 = e.target.result.split(',')[1];
      const ext = file.name.split('.').pop();
      const filename = `dashboard_${issueNumber}_${Date.now()}.${ext}`;

      try {
        // GitHub Contents API로 이미지 업로드
        const uploadRes = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/photos/${filename}`, {
          method: 'PUT',
          headers: {
            'Authorization': `token ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            message: `Add dashboard photo for issue #${issueNumber}`,
            content: base64
          })
        });
        if (!uploadRes.ok) throw new Error();
        const uploadData = await uploadRes.json();
        resolve(uploadData.content.download_url);
      } catch(e) { reject(e); }
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function closeDetail() {
  document.getElementById('detailPanel').style.display = 'none';
  currentIssue = null;
}

// 오늘 날짜 기본값
const today = new Date().toISOString().split('T')[0];
document.getElementById('startDate').value = today;
document.getElementById('endDate').value = today;
</script>
